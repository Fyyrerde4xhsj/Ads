<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="left">
    <h2>⚡ AI Builder</h2>

    <div id="chat"></div>

    <textarea id="prompt" placeholder="Create a portfolio website..."></textarea>
    <button onclick="generate()">Generate</button>

    <h3>History</h3>
    <ul id="history"></ul>
  </div>

  <div class="right">
    <div class="top">
      Live Preview
      <span id="loading" class="hidden">⏳</span>
    </div>
    <iframe id="frame"></iframe>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
