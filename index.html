<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Control Panel -->
        <aside class="control-panel">
            <header class="panel-header">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <span>AI Code Studio</span>
                </div>
            </header>

            <div class="chat-display" id="chatDisplay">
                <div class="message system">
                    Welcome! Describe the website or component you want to build, and I'll generate the live preview.
                </div>
            </div>

            <div class="history-section">
                <h3>Recent Builds</h3>
                <div class="history-list" id="historyList"></div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="promptInput" placeholder="e.g. Create a landing page for a coffee shop with a dark theme..."></textarea>
                    <button id="generateBtn" class="generate-btn">
                        <span class="btn-text">Generate</span>
                        <div class="loader" id="loader"></div>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Preview Panel -->
        <main class="preview-panel">
            <div class="preview-header">
                <div class="preview-tabs">
                    <div class="tab active">Live Preview</div>
                </div>
                <div class="status-indicator" id="statusIndicator">Ready</div>
            </div>
            <div class="iframe-container">
                <iframe id="previewIframe" sandbox="allow-scripts allow-modals allow-forms"></iframe>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
